services:
  # Database Service
  db:
    profiles: ["dev", "prod"]
    image: postgres:15-alpine
    container_name: kabana_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5432:5432"
    networks:
      - kabana_net
    restart: always

  # Development Web Service (FastAPI + Hot Reload)
  web:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: kabana_web_dev
    volumes:
      - .:/app
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - kabana_net
    depends_on:
      - db
      - ftp
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  # Admin Tools
  pgadmin:
    profiles: ["dev"]
    image: dpage/pgadmin4
    container_name: kabana_pgadmin
    env_file:
      - .env
    ports:
      - "5050:80"
    networks:
      - kabana_net
    depends_on:
      - db

  # FTP Server (Development)
  ftp:
    profiles: ["dev"]
    image: fauria/vsftpd
    container_name: kabana_ftp
    env_file:
      - .env
    environment:
      - PASV_MIN_PORT=21100
      - PASV_MAX_PORT=21110
      - LOCAL_UMASK=022
      # Ensure FTP user matches env vars if needed, though fauria/vsftpd uses FTP_USER/FTP_PASS
    volumes:
      - ./storage:/home/vsftpd/ftp_user
    ports:
      - "20:20"
      - "21:21"
      - "21100-21110:21100-21110"
    networks:
      - kabana_net

  # File Manager (Web Interface for files)
  filemanager:
    profiles: ["dev"]
    image: filebrowser/filebrowser
    container_name: kabana_filemanager
    volumes:
      - ./storage:/srv
      - filebrowser_data:/database
    environment:
      - FB_DATABASE=/database/filebrowser.db
      - FB_ROOT=/srv
    ports:
      - "8080:80"
    networks:
      - kabana_net

  # Production Web Service
  web_prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: kabana_web_prod
    volumes:
      - ./storage:/app/storage
    env_file:
      - .env
    networks:
      - kabana_net
    depends_on:
      - db
    restart: always
    # CMD is defined in Dockerfile.prod, no need to override here unless necessary

  # Nginx Reverse Proxy (Production)
  nginx:
    profiles: ["prod"]
    image: nginx:alpine
    container_name: kabana_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./storage:/usr/share/nginx/html/media:ro
      - ./app/static:/usr/share/nginx/html/static:ro
    networks:
      - kabana_net
    depends_on:
      - web_prod
    restart: always

  # Scraper Service
  scraper:
    profiles: ["scraper"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kabana_scraper
    # Override command to run the scraper script
    command: python app/scraper.py
    volumes:
      - .:/app
      - ./storage:/app/storage
    env_file:
      - .env
    networks:
      - kabana_net

volumes:
  postgres_data:
  filebrowser_data:

networks:
  kabana_net:
