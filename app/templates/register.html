<!doctype html>
<html class="no-js" lang="fa" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>ثبت‌نام — کابانا</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', path='img/logo/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/fontawesome-all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/themify-icons.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>
<main class="register-bg">
    <div class="breadcrumb-items">
        <div class="row">
            <ul class="breadcrumb">
                <li><a href="/" class="breadcrumb-link">صفحه اصلی</a></li>
                <li class="chevron"><span class="fa fa-chevron-left"></span></li>
                <li><span class="breadcrumb-active">ثبت‌نام</span></li>
            </ul>
        </div>
    </div>

    <div class="register-form-area">
        <div class="register-form">
            <div class="register-heading">
                <span>ثبت‌نام</span>
                <p>حساب کاربری جدید بسازید</p>
            </div>

            {% if error %}
            <div class="alert alert-danger" style="margin-bottom: 15px;">{{ error }}</div>
            {% endif %}

            <form method="post" action="/auth/register">
                <div class="input-box">
                    <div class="single-input-fields">
                        <label>نام</label>
                        <input type="text" name="first_name" class="auto-dir" placeholder="نام" value="{{ form.first_name|default('') }}" required minlength="2">
                    </div>
                    <div class="single-input-fields">
                        <label>نام خانوادگی</label>
                        <input type="text" name="last_name" class="auto-dir" placeholder="نام خانوادگی" value="{{ form.last_name|default('') }}" required minlength="2">
                    </div>
                    <div class="single-input-fields">
                        <label>شماره موبایل</label>
                        <input type="tel" name="phone" class="auto-dir" placeholder="09016513748" value="{{ form.phone|default('') }}" required pattern="09[0-9]{9}" dir="ltr">
                    </div>
                    <div class="single-input-fields">
                        <label>رمز عبور</label>
                        <div class="password-field">
                            <input type="password" id="reg-password" name="password" class="auto-dir" placeholder="حداقل ۶ کاراکتر" required minlength="6">
                            <button type="button" class="password-toggle" data-password-toggle="reg-password" aria-label="نمایش رمز">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="register-footer">
                    <p>قبلاً ثبت‌نام کرده‌اید؟ <a href="/auth/login">ورود</a></p>
                    <button type="submit" class="submit-btn3">ثبت‌نام</button>
                </div>
            </form>
        </div>
    </div>
</main>
<script src="{{ url_for('static', path='js/jquery-1.12.4.min.js') }}"></script>
<script src="{{ url_for('static', path='js/bootstrap.min.js') }}"></script>
<style>
.login-form-area .login-form,
.register-form-area .register-form {
    border-radius: 16px;
}
.password-field {
    position: relative;
    margin-bottom: 20px;
}
.password-field input {
    width: 100%;
    margin-bottom: 0 !important;
    padding-inline-end: 48px !important;
}
.password-toggle {
    position: absolute;
    inset-inline-end: 14px;
    top: 0;
    height: 50px;
    width: 36px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 0;
    background: transparent;
    color: #64748b;
    cursor: pointer;
    padding: 0;
    margin: 0;
    line-height: 1;
}
.password-toggle i { line-height: 1; font-size: 15px; }
.password-toggle:hover { color: #00a4a6; }
input.auto-dir { unicode-bidi: plaintext; }
</style>
<script>
(function () {
    function applyAutoDir(el) {
        var v = el.value || '';
        if (!v.trim()) {
            el.removeAttribute('dir');
            if (el.closest('.password-field')) {
                el.closest('.password-field').removeAttribute('dir');
            }
            return;
        }
        var dir = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF]/.test(v) ? 'rtl' : 'ltr';
        el.dir = dir;
        var wrap = el.closest('.password-field');
        if (wrap) wrap.setAttribute('dir', dir);
    }
    document.querySelectorAll('input.auto-dir').forEach(function (el) {
        applyAutoDir(el);
        el.addEventListener('input', function () { applyAutoDir(el); });
    });
    document.querySelectorAll('[data-password-toggle]').forEach(function (btn) {
        btn.addEventListener('click', function () {
            var input = document.getElementById(btn.getAttribute('data-password-toggle'));
            if (!input) return;
            var show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            var icon = btn.querySelector('i');
            if (icon) {
                icon.classList.toggle('fa-eye', !show);
                icon.classList.toggle('fa-eye-slash', show);
            }
        });
    });
})();
</script>
</body>
</html>
